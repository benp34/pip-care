<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="googlebot" content="noindex, nofollow">
<title>Care Profile — Pip</title>
<meta property="og:type" content="website">
<meta property="og:title" content="Care Profile — shared via Pip">
<meta property="og:description" content="View your pup's complete care profile including vet info, medications, diet &amp; more.">
<meta property="og:url" content="https://share.pip.dog/">
<meta property="og:image" content="https://share.pip.dog/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="Pip — a shareable care profile for your dog">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Care Profile — shared via Pip">
<meta name="twitter:description" content="View your pup's complete care profile including vet info, medications, diet &amp; more.">
<meta name="twitter:image" content="https://share.pip.dog/og-image.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--purple:#A855F7;--purple-dark:#7C3AED;--bg:#FAFAF9;--card:#fff;--text:#1F2937;--text-sub:#6B7280;--text-light:#9CA3AF;--border:#E5E7EB;--green:#22C55E}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);min-height:100vh;color:var(--text);-webkit-font-smoothing:antialiased}

/* Header */
.header{background:linear-gradient(135deg,#A855F7 0%,#7C3AED 50%,#6D28D9 100%);padding:48px 24px 56px;text-align:center;color:#fff;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-60px;right:-60px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.06)}
.header::after{content:'';position:absolute;bottom:-30px;left:50%;transform:translateX(-50%);width:120%;height:60px;background:var(--bg);border-radius:50% 50% 0 0}
.pip-brand{display:inline-flex;align-items:center;gap:6px;margin-bottom:20px}
.pip-brand-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:5px 14px 5px 10px}
.pip-brand-pill .paw{font-size:16px}
.pip-brand-pill span{font-family:'Quicksand',sans-serif;font-weight:700;font-size:13px;letter-spacing:.5px}
.live-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;background:rgba(255,255,255,.12);border-radius:12px;padding:4px 10px;margin-left:8px}
.live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(34,197,94,.4)}50%{opacity:.6;box-shadow:0 0 0 4px rgba(34,197,94,0)}}
.pip-mascot{width:72px;height:72px;margin:0 auto 16px;animation:float 3s ease-in-out infinite}
.pip-mascot img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 6px 16px rgba(0,0,0,.2))}
.avatar{width:80px;height:80px;border-radius:50%;border:3px solid rgba(255,255,255,.35);object-fit:cover;margin:0 auto 14px;display:block;box-shadow:0 6px 20px rgba(0,0,0,.18)}
.avatar-placeholder{display:none}
.dog-name{font-family:'Quicksand',sans-serif;font-size:28px;font-weight:700;margin-bottom:4px;letter-spacing:-.5px}
.dog-info{font-size:13px;opacity:.85;font-weight:500}

/* Container */
.container{max-width:500px;margin:-24px auto 0;padding:0 16px;position:relative;z-index:1}

/* Section card */
.section{background:var(--card);border-radius:16px;margin-bottom:12px;border-left:4px solid #D1D5DB;box-shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.04);overflow:hidden}
.section-header{display:flex;align-items:center;gap:10px;padding:16px 18px}
.section-emoji{font-size:22px;line-height:1}
.section-title{font-family:'Quicksand',sans-serif;font-size:16px;font-weight:700;flex:1;color:var(--text)}
.entry-count{background:rgba(255,255,255,.6);color:var(--text-sub);font-size:11px;font-weight:600;padding:3px 10px;border-radius:12px}
.section-body{padding:12px 14px 14px;display:flex;flex-direction:column;gap:8px}

/* Entry — tinted card with colored left border, matching in-app */
.entry{padding:12px;border-radius:10px;border-left:3px solid #D1D5DB}
.entry-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.entry-title{font-family:'Inter',sans-serif;font-size:13px;font-weight:700;color:var(--text)}
.entry-content{font-size:12px;color:#374151;line-height:1.5;margin-top:3px}
.entry-label{font-weight:500;color:#6B7280;font-size:12px}
.entry-date{font-size:12px;color:#9CA3AF;font-weight:400}
.entry-link{color:#2563EB;text-decoration:none;font-weight:500;display:inline-flex;align-items:center;gap:4px}
.entry-link:hover{text-decoration:underline}
/* Inline viewer — keeps recipients on share.pip.dog, never leaks the storage URL */
.viewer{position:fixed;inset:0;background:rgba(17,24,39,.92);display:none;z-index:1000;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(8px)}
.viewer.open{display:flex}
.viewer-inner{position:relative;width:100%;height:100%;max-width:1100px;display:flex;align-items:center;justify-content:center}
.viewer-inner img{max-width:100%;max-height:100%;object-fit:contain;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.viewer-inner iframe{width:100%;height:100%;border:none;border-radius:8px;background:#fff}
.viewer-close{position:absolute;top:12px;right:12px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.25);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;line-height:1;cursor:pointer;user-select:none;z-index:2}
.viewer-close:hover{background:rgba(255,255,255,.25)}
.viewer-dl{position:absolute;bottom:16px;right:16px;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.25);color:#fff;padding:10px 18px;border-radius:999px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;text-decoration:none;z-index:2}
.viewer-dl:hover{background:rgba(255,255,255,.25)}
.severity-badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:600}
.severity-severe{background:#FEE2E2;color:#DC2626}
.severity-moderate{background:#FFF7ED;color:#EA580C}
.severity-mild{background:#FEFCE8;color:#CA8A04}
/* Tap-to-view link — matches in-app Documents section (plain purple text, no box) */
.tap-view{display:inline-block;margin-top:6px;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;color:#9333EA;text-decoration:none;-webkit-tap-highlight-color:transparent}
.tap-view:hover{text-decoration:underline}
.empty{font-size:13px;color:var(--text-light);font-style:italic;padding:12px 0}
.free-text{font-size:14px;color:#374151;line-height:1.6;padding:10px 0;white-space:pre-wrap;word-break:break-word}
.meal-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0}
.meal-name{font-size:13px;font-weight:500;color:var(--text)}
.meal-time{font-size:12px;color:var(--text-light);font-weight:500}

/* Footer */
.footer{text-align:center;padding:36px 24px 48px;color:var(--text-light)}
.footer p{font-size:12px;line-height:1.6}
.footer-badge{display:inline-flex;align-items:center;gap:8px;background:var(--card);border-radius:24px;padding:10px 20px;font-family:'Quicksand',sans-serif;font-size:14px;font-weight:700;color:var(--purple);box-shadow:0 2px 12px rgba(168,85,247,.12);margin-top:16px}

/* Loading */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px;background:linear-gradient(180deg,#F5F3FF 0%,#EDE9FE 100%)}
.loading-mascot{width:80px;height:80px;margin-bottom:20px;animation:float 2s ease-in-out infinite}
.loading-mascot img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 6px 16px rgba(168,85,247,.3))}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.loading-text{font-family:'Quicksand',sans-serif;font-size:18px;font-weight:700;color:var(--purple-dark);margin-bottom:6px}
.loading-sub{font-size:13px;color:var(--text-sub)}
.loading-bar{width:120px;height:4px;background:#E5E7EB;border-radius:4px;margin-top:20px;overflow:hidden}
.loading-bar::after{content:'';display:block;width:40%;height:100%;background:var(--purple);border-radius:4px;animation:slide 1s ease-in-out infinite}
@keyframes slide{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}

/* Error / PIN card */
.card{background:var(--card);border-radius:24px;padding:40px 32px;max-width:400px;width:100%;margin:0 auto;box-shadow:0 4px 24px rgba(168,85,247,.08),0 1px 3px rgba(0,0,0,.04);text-align:center}
.card-center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(180deg,#F5F3FF,#EDE9FE)}
.card .icon{font-size:48px;margin-bottom:16px}
.card h1{font-family:'Quicksand',sans-serif;font-size:22px;color:var(--text);margin-bottom:8px;font-weight:700}
.card p{font-size:14px;color:var(--text-sub);line-height:1.6}
.card .error-msg{color:#EF4444;font-size:13px;font-weight:500;margin-bottom:12px;padding:8px 12px;background:#FEF2F2;border-radius:8px}
.pin-input{display:flex;gap:12px;justify-content:center;margin:24px 0}
.pin-input input{width:48px;height:56px;text-align:center;font-family:'Quicksand',sans-serif;font-size:24px;font-weight:700;border:2px solid var(--border);border-radius:14px;outline:none;transition:border-color .2s,box-shadow .2s;color:var(--text)}
.pin-input input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(168,85,247,.15)}
.card button{width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,#A855F7,#7C3AED);color:#fff;font-family:'Quicksand',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:transform .1s,box-shadow .2s;box-shadow:0 4px 12px rgba(168,85,247,.25)}
.card button:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(168,85,247,.3)}
.card button:active{transform:translateY(0)}
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="loading-mascot"><img src="pip-jumping.png" alt="Pip"></div><div class="loading-text">Loading care profile</div><div class="loading-sub">Fetching the latest data...</div><div class="loading-bar"></div></div></div>
<div id="viewer" class="viewer" role="dialog" aria-modal="true"><div class="viewer-inner" id="viewerInner"></div></div>
<script>
var API='https://wsihkqgpjhrgwuzsxchy.supabase.co/functions/v1/share';
var params=new URLSearchParams(window.location.search);
var TK=params.get('token');

function E(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function D(d){try{return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}catch(e){return d||''}}

function BC(t){t=t.toLowerCase();if(t.includes('vet')||t.includes('vaccination')||t.includes('microchip'))return'#93C5FD';if(t.includes('medication')||t.includes('allerg')||t.includes('symptom'))return'#67E8F9';if(t.includes('diet'))return'#FF8C7A';if(t.includes('groom'))return'#F9A8D4';if(t.includes('training')||t.includes('quirk'))return'#22C55E';if(t.includes('potty'))return'#F472B6';if(t.includes('household'))return'#FB923C';if(t.includes('exercise'))return'#A3E635';if(t.includes('sleep'))return'#A855F7';if(t.includes('document')||t.includes('contact'))return'#C084FC';return'#D1D5DB'}

// Soft tint for section header + entry cards (matches in-app bgStart palette).
function BG(t){t=t.toLowerCase();if(t.includes('vet')||t.includes('vaccination')||t.includes('microchip'))return'#EFF6FF';if(t.includes('medication')||t.includes('allerg')||t.includes('symptom'))return'#ECFEFF';if(t.includes('diet'))return'#FFF7ED';if(t.includes('groom'))return'#FDF2F8';if(t.includes('training')||t.includes('quirk'))return'#F0FDF4';if(t.includes('potty'))return'#FDF2F8';if(t.includes('household'))return'#FFF7ED';if(t.includes('exercise'))return'#F7FEE7';if(t.includes('sleep'))return'#FAF5FF';if(t.includes('document')||t.includes('contact'))return'#FAF5FF';return'#F9FAFB'}

function SE(t){t=t.toLowerCase();if(t.includes('vaccination'))return'\u{1F489}';if(t.includes('contact'))return'\u{1F465}';if(t.includes('vet'))return'\u{1F3E5}';if(t.includes('medication'))return'\u{1F48A}';if(t.includes('allerg'))return'\u26A0\uFE0F';if(t.includes('diet'))return'\u{1F37D}\uFE0F';if(t.includes('groom'))return'\u2702\uFE0F';if(t.includes('symptom'))return'\u{1F321}\uFE0F';if(t.includes('document'))return'\u{1F4C4}';if(t.includes('exercise'))return'\u{1F3C3}';if(t.includes('sleep'))return'\u{1F634}';if(t.includes('training'))return'\u{1F393}';if(t.includes('quirk'))return'\u26A1';if(t.includes('household'))return'\u{1F3E0}';if(t.includes('potty'))return'\u{1F6BD}';return'\u{1F4CC}'}

function FE(en,st,bc,bg){
  var t=(st||'').toLowerCase();
  var style='';
  if(bc)style+='border-left-color:'+bc+';';
  if(bg)style+='background:'+bg+';';
  var h='<div class="entry"'+(style?' style="'+style+'"':'')+'>';
  // Diet + Grooming don't need dates — matches in-app which hides them.
  var showDate=!(t.includes('diet')||t.includes('groom'));
  h+='<div class="entry-header"><span class="entry-title">'+E(en.title)+'</span>';
  if(showDate&&en.entry_date)h+='<span class="entry-date">'+D(en.entry_date)+'</span>';
  h+='</div>';

  if(en.content){try{
    var p=JSON.parse(en.content);
    if(typeof p==='object'&&p!==null){
      if(t.includes('contact')){
        h+='<div class="entry-content">';
        if(p.role)h+='<div style="color:var(--text-sub);font-size:12px;margin-bottom:4px">'+E(p.role)+'</div>';
        // Strip whitespace from tel: URL — iOS treats `tel:+44 7xxx` with spaces as malformed and falls back to Messages.
        if(p.phone)h+='<div><a class="entry-link" href="tel:'+E(String(p.phone).replace(/[^\d+]/g,''))+'">\u{1F4F1} '+E(p.phone)+'</a></div>';
        if(p.phone2)h+='<div><a class="entry-link" href="tel:'+E(String(p.phone2).replace(/[^\d+]/g,''))+'">\u{1F4F1} '+E(p.phone2)+'</a></div>';
        if(p.email)h+='<div><a class="entry-link" href="mailto:'+E(p.email)+'">\u2709\uFE0F '+E(p.email)+'</a></div>';
        if(p.content||p.notes)h+='<div style="color:var(--text-sub);margin-top:6px;font-size:12px">'+E(p.content||p.notes)+'</div>';
        h+='</div>';
      }else if(t.includes('allerg')){
        h+='<div class="entry-content">';
        if(p.severity){var cls=p.severity==='Severe'?'severe':p.severity==='Moderate'?'moderate':'mild';h+='<span class="severity-badge severity-'+cls+'">'+E(p.severity)+'</span> '}
        if(p.reaction)h+='<div style="margin-top:4px"><span class="entry-label">Reaction:</span> '+E(p.reaction)+'</div>';
        if(p.content||p.notes)h+='<div style="color:var(--text-sub);margin-top:4px;font-size:12px">'+E(p.content||p.notes)+'</div>';
        h+='</div>';
      }else if(Array.isArray(p.meals)){
        h+='<div class="entry-content">';
        p.meals.forEach(function(m){h+='<div class="meal-row"><span class="meal-name">'+E(m.name||'Meal')+'</span><span class="meal-time">'+E(m.time||'Not set')+'</span></div>'});
        h+='</div>';
      }else if(t.includes('groom')){
        h+='<div class="entry-content">';
        if(p.frequency){var fr=(p.frequency==='Custom'&&p.customNum&&p.customUnit)?'Every '+p.customNum+' '+p.customUnit:p.frequency;h+='<div><span class="entry-label">Frequency:</span> '+E(fr)+'</div>'}
        if(p.duration)h+='<div><span class="entry-label">Duration:</span> '+E(p.duration)+' mins</div>';
        if(p.notes||p.content)h+='<div style="color:var(--text-sub);margin-top:4px;font-size:12px">'+E(p.notes||p.content)+'</div>';
        h+='</div>';
      }else if(t.includes('vet')){
        h+='<div class="entry-content">';
        if(p.reason)h+='<div><span class="entry-label">Reason:</span> '+E(p.reason)+'</div>';
        if(p.outcome)h+='<div><span class="entry-label">Outcome:</span> '+E(p.outcome)+'</div>';
        if(p.content||p.notes)h+='<div style="color:var(--text-sub);margin-top:4px;font-size:12px">'+E(p.content||p.notes)+'</div>';
        h+='</div>';
      }else if(t.includes('vaccination')){
        h+='<div class="entry-content">';
        if(p.valid_for)h+='<div><span class="entry-label">Valid for:</span> '+E(p.valid_for)+'</div>';
        if(p.content||p.notes)h+='<div style="color:var(--text-sub);margin-top:4px;font-size:12px">'+E(p.content||p.notes)+'</div>';
        h+='</div>';
      }else if(t.includes('medication')){
        h+='<div class="entry-content">';
        if(p.dosage)h+='<div><span class="entry-label">Dosage:</span> '+E(p.dosage)+'</div>';
        if(p.content||p.notes)h+='<div style="color:var(--text-sub);margin-top:4px;font-size:12px">'+E(p.content||p.notes)+'</div>';
        h+='</div>';
      }else if(t.includes('document')){
        h+='<div class="entry-content">';
        if(p.doc_category)h+='<div><span class="entry-label">Category:</span> '+E(p.doc_category)+'</div>';
        if(p.content||p.notes)h+='<div style="color:var(--text-sub);margin-top:4px;font-size:12px">'+E(p.content||p.notes)+'</div>';
        h+='</div>';
      }else{
        var pts=[],sk=['is_key','isKey','date','time'];
        for(var k in p){if(!p[k]||!String(p[k]).trim()||sk.indexOf(k)>=0)continue;var lb=k.replace(/_/g,' ').replace(/([A-Z])/g,' $1').replace(/^./,function(s){return s.toUpperCase()}).trim();pts.push('<span class="entry-label">'+E(lb)+':</span> '+E(String(p[k])))}
        if(pts.length)h+='<div class="entry-content">'+pts.join('<br/>')+'</div>';
      }
    }else{h+='<div class="entry-content">'+E(String(p))+'</div>'}
  }catch(e){h+='<div class="entry-content">'+E(en.content)+'</div>'}}

  // Photo thumbnail (images) or compact doc link (PDFs / other files).
  // Clicks are intercepted and opened in an inline viewer so recipients
  // never see the raw storage URL in the address bar.
  if(en.file_url){
    var isImg=en.file_type&&(en.file_type.includes('image')||en.file_type.includes('heic')||en.file_type.includes('jpg')||en.file_type.includes('png'));
    var isPdf=en.file_type&&en.file_type.includes('pdf');
    var safeUrl=E(en.file_url);
    var safeName=E(en.title||'file');
    // Mirror in-app Documents section — plain purple text link, no box, no emoji.
    var label, vtype;
    if(isImg){      label='Tap to view image';    vtype='image';
    }else if(isPdf){label='Tap to view document'; vtype='pdf';
    }else{          label='Tap to view document'; vtype='file'; }
    h+='<a class="tap-view" href="'+safeUrl+'" data-view-type="'+vtype+'" data-view-url="'+safeUrl+'" data-view-name="'+safeName+'" target="_blank" rel="noopener">'+label+'</a>';
  }

  h+='</div>';
  return h;
}

function render(data){
  var d=data.dog,info=[d.breed,d.age].filter(Boolean).join(' \u2022 ');
  var h='<div class="header">';
  h+='<div class="pip-brand"><div class="pip-brand-pill"><span class="paw">\u{1F43E}</span><span>pip</span></div>';
  h+='<span class="live-badge"><span class="live-dot"></span>live</span>';
  h+='</div>';
  h+='<div class="pip-mascot"><img src="pip-jumping.png" alt="Pip mascot"></div>';
  if(d.photo_url)h+='<img class="avatar" src="'+E(d.photo_url)+'" alt="'+E(d.name)+'">';
  h+='<div class="dog-name">'+E(d.name)+'</div>';
  if(info)h+='<div class="dog-info">'+E(info)+'</div>';
  h+='</div><div class="container">';

  if(!data.sections||!data.sections.length){
    h+='<div class="section"><div class="section-body"><div class="empty">No care plan entries yet.</div></div></div>';
  }else{
    data.sections.forEach(function(s){
      var bc=BC(s.title),bg=BG(s.title);
      h+='<div class="section" style="border-left-color:'+bc+'">';
      h+='<div class="section-header" style="background:'+bg+'"><span class="section-emoji">'+(s.emoji||SE(s.title))+'</span>';
      h+='<span class="section-title">'+E(s.title)+'</span>';
      if((!s.type||s.type==='data')&&s.entries&&s.entries.length)h+='<span class="entry-count">'+s.entries.length+'</span>';
      h+='</div><div class="section-body">';
      if(s.type==='text'){
        // Free-text section — preserve line breaks from user input.
        h+='<div class="free-text">'+E(s.content).replace(/\n/g,'<br/>')+'</div>';
      }else{
        // Data-driven section (default for legacy payloads without `type`).
        var es=s.entries||[];
        if(!es.length)h+='<div class="empty">No entries yet</div>';
        else es.forEach(function(e){h+=FE(e,s.title,bc,bg)});
      }
      h+='</div></div>';
    });
  }

  h+='</div>';
  h+='<div class="footer"><p>This care profile updates live.<br>Refresh to see the latest info.</p>';
  h+='<div class="footer-badge">\u{1F43E} Powered by Pip</div></div>';

  document.getElementById('app').innerHTML=h;
  document.title=d.name+"'s Care Profile \u2014 Pip";
  // Update OG title dynamically (won't affect already-shared previews but helps bookmarks)
  var ogTitle=document.querySelector('meta[property="og:title"]');
  if(ogTitle)ogTitle.content='\u{1F43E} '+d.name+"'s Care Profile";
}

function err(icon,title,msg){
  document.getElementById('app').innerHTML='<div class="card-center"><div class="card"><div class="icon">'+icon+'</div><h1>'+E(title)+'</h1><p>'+E(msg)+'</p><div style="margin-top:24px"><div class="footer-badge">\u{1F43E} Pip</div></div></div></div>';
}

function pinUI(em){
  var h='<div class="card-center"><div class="card">';
  h+='<div class="pip-logo" style="justify-content:center;margin-bottom:24px"><div class="pip-logo-icon">\u{1F43E}</div><span style="color:var(--purple)">pip</span></div>';
  h+='<h1>\u{1F510} PIN Required</h1>';
  h+='<p style="margin-bottom:4px">This care profile is protected.</p><p>Enter the 4-digit PIN to view it.</p>';
  if(em)h+='<p class="error-msg" style="margin-top:12px">'+E(em)+'</p>';
  h+='<div class="pin-input">';
  for(var i=0;i<4;i++)h+='<input type="tel" maxlength="1" pattern="[0-9]" inputmode="numeric"'+(i===0?' autofocus':'')+'>';
  h+='</div><button id="ps">View Care Profile</button></div></div>';
  document.getElementById('app').innerHTML=h;

  var ins=document.querySelectorAll('.pin-input input');
  ins.forEach(function(inp,i){
    inp.addEventListener('input',function(){inp.value=inp.value.replace(/\D/g,'');if(inp.value&&i<3)ins[i+1].focus()});
    inp.addEventListener('keydown',function(e){if(e.key==='Backspace'&&!inp.value&&i>0)ins[i-1].focus()});
  });
  document.getElementById('ps').addEventListener('click',function(){
    var pin=Array.from(ins).map(function(x){return x.value}).join('');
    if(pin.length===4)load(pin);
  });
}

// ── Inline viewer (keeps recipients on share.pip.dog; hides raw storage URL) ──
function openViewer(type,url,name){
  var v=document.getElementById('viewer'),inner=document.getElementById('viewerInner');
  var close='<button class="viewer-close" aria-label="Close" onclick="closeViewer()">\u2715</button>';
  var dl='<a class="viewer-dl" href="'+E(url)+'" download="'+E(name||'file')+'" target="_blank" rel="noopener">Download</a>';
  if(type==='image'){
    inner.innerHTML=close+'<img src="'+E(url)+'" alt="'+E(name||'Photo')+'">'+dl;
  }else if(type==='pdf'){
    inner.innerHTML=close+'<iframe src="'+E(url)+'" title="'+E(name||'PDF')+'"></iframe>'+dl;
  }else{
    // Unknown file type — fall back to opening the file directly (rare path)
    window.open(url,'_blank','noopener');return;
  }
  v.classList.add('open');
  document.body.style.overflow='hidden';
}
function closeViewer(){
  var v=document.getElementById('viewer'),inner=document.getElementById('viewerInner');
  v.classList.remove('open');
  inner.innerHTML='';
  document.body.style.overflow='';
}
// Delegated click handler — intercept any link with data-view-type
document.addEventListener('click',function(ev){
  var a=ev.target.closest&&ev.target.closest('[data-view-type]');
  if(!a)return;
  ev.preventDefault();
  openViewer(a.getAttribute('data-view-type'),a.getAttribute('data-view-url'),a.getAttribute('data-view-name'));
});
// Close on overlay click or Esc key
document.addEventListener('click',function(ev){
  if(ev.target&&ev.target.id==='viewer')closeViewer();
});
document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeViewer()});

async function load(pin){
  if(!TK){err('\u{1F615}','Invalid Link','This share link is missing a token.');return}
  var u=API+'?token='+encodeURIComponent(TK);
  if(pin)u+='&pin='+encodeURIComponent(pin);
  try{
    var r=await fetch(u);var d=await r.json();
    if(d.error==='pin_required'){pinUI();return}
    if(d.error==='pin_incorrect'){pinUI('Incorrect PIN. Please try again.');return}
    if(d.error==='not_found'){err('\u{1F615}','Not Found',d.message);return}
    if(d.error==='expired'){err('\u23F0','Link Expired',d.message);return}
    if(d.error==='revoked'){err('\u{1F6AB}','Link Revoked',d.message);return}
    if(d.error){err('\u{1F615}','Error',d.message||'Something went wrong.');return}
    render(d);
  }catch(e){err('\u{1F615}','Connection Error','Could not load the care profile. Please check your connection and try again.')}
}
load();
</script>
