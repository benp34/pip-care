<html lang="en">

<!-- PDF.js — renders PDFs in a canvas we control so we can fit-to-width on mobile -->
<!-- (iOS Safari's native PDF renderer ignores URL fragments and opens at 100% zoom). -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>if(window.pdfjsLib)pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
<style>
:root{--purple:#A855F7;--purple-dark:#7C3AED;--bg:#FAFAF9;--card:#fff;--text:#1F2937;--text-sub:#6B7280;--text-light:#9CA3AF;--border:#E5E7EB;--green:#22C55E}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);min-height:100vh;color:var(--text);-webkit-font-smoothing:antialiased}

/* Header */
.header{background:linear-gradient(180deg,#E6D5FB 0%,#EDE0FB 12%,#F1E8FA 28%,#F5EFF8 45%,#F8F4FA 62%,#FAFAF9 78%,#FAFAF9 100%);padding:40px 24px 16px;text-align:center;color:#1F2937;position:relative;overflow:hidden;border-radius:0 0 28px 28px}
/* Avatar ring — pulsating lilac glow */
.avatar-ring{width:96px;height:96px;border-radius:50%;padding:3px;background:linear-gradient(135deg,rgba(168,85,247,.5),rgba(255,255,255,.8));margin:0 auto 0;animation:avatar-pulse 3s ease-in-out infinite}
@keyframes avatar-pulse{0%,100%{box-shadow:0 0 0 0 rgba(168,85,247,.12),0 4px 12px rgba(168,85,247,.1)}50%{box-shadow:0 0 0 5px rgba(168,85,247,.06),0 4px 14px rgba(168,85,247,.15)}}
.avatar{width:90px;height:90px;border-radius:50%;object-fit:cover;display:block;background:#EDE9FE}
.avatar-placeholder{width:90px;height:90px;border-radius:50%;object-fit:contain;display:block;background:#EDE9FE;padding:12px}
/* Mascot */
.pip-mascot{width:80px;height:80px;margin:0 auto -8px;animation:float 3s ease-in-out infinite;position:relative;z-index:1}
.pip-mascot img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 4px 12px rgba(168,85,247,.2))}
/* Heading */
.dog-name{font-family:'Quicksand',sans-serif;font-size:26px;font-weight:700;margin:14px 0 6px;letter-spacing:-.3px;color:#1F2937}
/* "Shared live via Pip" line */
.dog-subtitle{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:500;color:#9CA3AF;margin-bottom:22px}
.pip-inline-logo{height:13px;width:auto;vertical-align:middle;filter:brightness(0) saturate(100%) invert(13%) sepia(60%) saturate(800%) hue-rotate(245deg) brightness(85%)}
/* Stats card */
.stats-card{display:flex;background:#fff;border-radius:20px;border:1.5px solid rgba(17,24,39,.12);box-shadow:0 4px 12px rgba(17,24,39,.08);margin:0 0 14px;overflow:hidden}
.stats-gap{height:14px}
.stat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px 8px;gap:2px}
.stat+.stat{border-left:1px solid #F9FAFB}
.stat-value{font-family:'Quicksand',sans-serif;font-size:14px;font-weight:700;color:#1F2937;line-height:1.2}
.stat-label{font-size:11px;color:#9CA3AF;font-weight:500}
/* Live dot */
.live-dot{display:inline-block;width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;vertical-align:middle}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(34,197,94,.4)}50%{opacity:.6;box-shadow:0 0 0 4px rgba(34,197,94,0)}}

/* Container */
.container{max-width:500px;margin:-24px auto 0;padding:0 16px;position:relative;z-index:1}

/* Section card */
.section{background:var(--card);border-radius:16px;margin-bottom:14px;border:1.5px solid rgba(17,24,39,.12);box-shadow:0 4px 12px rgba(17,24,39,.08);overflow:hidden}
.section-header{display:flex;align-items:center;gap:10px;padding:16px 18px}
.section-emoji{font-size:22px;line-height:1}
.section-title{font-family:'Quicksand',sans-serif;font-size:16px;font-weight:700;flex:1;color:var(--text)}
.entry-count{background:rgba(255,255,255,.6);color:var(--text-sub);font-size:11px;font-weight:600;padding:3px 10px;border-radius:12px}
.section-body{padding:12px 14px 14px;display:flex;flex-direction:column;gap:8px}

/* Entry — faint grey card with a coloured left border that picks up the section's accent.
   Section header keeps its tint; each entry stays neutral so the section's colour identity
   is carried only by the border strip (matches the in-app Care Profile design). */
.entry{padding:12px;border-radius:10px;border-left:3px solid #D1D5DB;background:#F9FAFB}
.entry-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.entry-title{font-family:'Quicksand',sans-serif;font-size:13px;font-weight:700;color:var(--text)}
.entry-content{font-size:12px;color:#374151;line-height:1.5;margin-top:3px}
.entry-label{font-weight:500;color:#6B7280;font-size:12px}
.entry-date{font-size:12px;color:#9CA3AF;font-weight:400}
.entry-link{color:#2563EB;text-decoration:none;font-weight:500;display:inline-flex;align-items:center;gap:4px}
.entry-link:hover{text-decoration:underline}
/* Inline viewer — keeps recipients on share.pip.dog, never leaks the storage URL.
   As close to fullscreen as a non-PWA Safari tab allows: 100dvh picks up the
   extra viewport when Safari auto-collapses its URL bar on scroll; inset:0
   with zero internal padding lets the image or PDF canvas extend edge-to-edge. */
.viewer{position:fixed;inset:0;width:100vw;height:100vh;height:100dvh;background:#000;display:none;z-index:1000;flex-direction:column;overscroll-behavior:contain}
.viewer.open{display:flex}
.viewer-close{position:fixed;top:max(16px,env(safe-area-inset-top));left:16px;z-index:1001;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;line-height:1;cursor:pointer;user-select:none;padding:0;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(17,24,39,.55);border:1px solid rgba(255,255,255,.18);color:#fff;box-shadow:0 2px 10px rgba(0,0,0,.25);transition:background .15s}
.viewer-close:hover{background:rgba(17,24,39,.75)}
.viewer-inner{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;padding:0;overflow:hidden;background:#000}
.viewer-inner img{max-width:100vw;max-height:100dvh;width:auto;height:auto;object-fit:contain;display:block}
/* PDF canvas container — scrolls vertically, pages extend to viewport edges */
.pdf-pages{width:100%;height:100%;overflow-y:auto;overflow-x:hidden;padding:64px 0 env(safe-area-inset-bottom);-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;align-items:center;gap:8px;background:#1F2937}
.pdf-pages canvas{width:100%;max-width:100vw;height:auto;background:#fff;display:block}
.pdf-loading{color:#fff;font-family:'Inter',sans-serif;font-size:14px;opacity:.85;padding:24px}
.severity-badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:600}
.severity-severe{background:#FEE2E2;color:#DC2626}
.severity-moderate{background:#FFF7ED;color:#EA580C}
.severity-mild{background:#FEFCE8;color:#CA8A04}
.med-status{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:600;margin-top:4px}
.med-status-active{background:#DCFCE7;color:#16A34A}
.med-status-inactive{background:#F3F4F6;color:#6B7280}
/* Tap-to-view link — matches in-app: small inline icon + purple text, no box */
.tap-view{display:inline-flex;align-items:center;gap:6px;margin-top:6px;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;color:#9333EA;text-decoration:none;-webkit-tap-highlight-color:transparent}
.tap-view svg{width:14px;height:14px;flex-shrink:0}
.tap-view:hover{text-decoration:underline}
.empty{font-size:13px;color:var(--text-light);font-style:italic;padding:12px 0}
.free-text{font-family:'Inter',sans-serif;font-size:13px;color:#374151;line-height:1.5;padding:4px 0;white-space:pre-wrap;word-break:break-word}
.meal-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0}
.meal-name{font-size:13px;font-weight:500;color:var(--text)}
.meal-time{font-size:12px;color:var(--text-light);font-weight:500}

/* Footer */
.footer{text-align:center;padding:36px 24px 48px;color:var(--text-light)}
.footer p{font-size:12px;line-height:1.6}
.footer-badge{display:inline-flex;align-items:center;gap:8px;background:var(--card);border-radius:24px;padding:10px 20px;font-family:'Quicksand',sans-serif;font-size:14px;font-weight:700;color:var(--purple);box-shadow:0 2px 12px rgba(168,85,247,.12);margin-top:16px}

/* Loading */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px;background:linear-gradient(180deg,#E6D5FB 0%,#EDE0FB 12%,#F1E8FA 28%,#F5EFF8 45%,#F8F4FA 62%,#FAFAF9 78%,#FAFAF9 100%)}
.loading-mascot{width:120px;height:120px;margin-bottom:16px;animation:float 2s ease-in-out infinite;background:radial-gradient(circle,rgba(216,180,254,0.22) 0%,rgba(216,180,254,0.06) 55%,transparent 75%);border-radius:50%;display:flex;align-items:center;justify-content:center}
.loading-mascot img{width:78px;height:78px;object-fit:contain;mix-blend-mode:multiply}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.loading-text{font-family:'Quicksand',sans-serif;font-size:18px;font-weight:700;color:var(--purple-dark);margin-bottom:6px}
.loading-sub{font-size:13px;color:var(--text-sub)}
.loading-bar{width:120px;height:4px;background:#E5E7EB;border-radius:4px;margin-top:20px;overflow:hidden}
.loading-bar::after{content:'';display:block;width:40%;height:100%;background:var(--purple);border-radius:4px;animation:slide 1s ease-in-out infinite}
@keyframes slide{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}

/* Error / PIN card */
.card{background:var(--card);border-radius:24px;padding:40px 32px;max-width:400px;width:100%;margin:0 auto;box-shadow:0 4px 24px rgba(168,85,247,.08),0 1px 3px rgba(0,0,0,.04);text-align:center}
.card-center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(180deg,#F5F3FF,#EDE9FE)}
.card .icon{font-size:48px;margin-bottom:16px}
.card h1{font-family:'Quicksand',sans-serif;font-size:22px;color:var(--text);margin-bottom:8px;font-weight:700}
.card p{font-size:14px;color:var(--text-sub);line-height:1.6}
.card .error-msg{color:#EF4444;font-size:13px;font-weight:500;margin-bottom:12px;padding:8px 12px;background:#FEF2F2;border-radius:8px}
.pin-input{display:flex;gap:12px;justify-content:center;margin:24px 0}
.pin-input input{width:48px;height:56px;text-align:center;font-family:'Quicksand',sans-serif;font-size:24px;font-weight:700;border:2px solid var(--border);border-radius:14px;outline:none;transition:border-color .2s,box-shadow .2s;color:var(--text)}
.pin-input input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(168,85,247,.15)}
.card button{width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,#A855F7,#7C3AED);color:#fff;font-family:'Quicksand',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:transform .1s,box-shadow .2s;box-shadow:0 4px 12px rgba(168,85,247,.25)}
.card button:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(168,85,247,.3)}
.card button:active{transform:translateY(0)}
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="loading-mascot"><img src="pip-jumping.png" alt="Pip"></div><div class="loading-text" id="loadingText">Loading care profile</div><div class="loading-sub">Fetching the latest data...</div><div class="loading-bar"></div></div></div>
<div id="viewer" class="viewer" role="dialog" aria-modal="true"><button class="viewer-close" id="viewerClose" aria-label="Close">&#x2190;</button><div class="viewer-inner" id="viewerInner"></div></div>
<script>
var API='https://wsihkqgpjhrgwuzsxchy.supabase.co/functions/v1/share';
var params=new URLSearchParams(window.location.search);
var TK=params.get('token');
// Personalise loading text — URL param takes priority (first load), then localStorage (repeat visit)
(function(){var n=(TK&&params.get('name'))||( TK&&localStorage.getItem('pip_name_'+TK));if(n)n=decodeURIComponent(n);var el=document.getElementById('loadingText');if(n&&el)el.textContent='Loading '+n+"'s care profile";}());

function E(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function D(d){try{return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}catch(e){return d||''}}

function BC(t){t=t.toLowerCase();if(t.includes('vet')||t.includes('vaccination')||t.includes('microchip'))return'#93C5FD';if(t.includes('medication')||t.includes('allerg')||t.includes('symptom'))return'#67E8F9';if(t.includes('diet'))return'#FF8C7A';if(t.includes('groom'))return'#F9A8D4';if(t.includes('training')||t.includes('quirk'))return'#22C55E';if(t.includes('potty'))return'#F472B6';if(t.includes('household'))return'#FB923C';if(t.includes('exercise'))return'#A3E635';if(t.includes('sleep'))return'#A855F7';if(t.includes('document')||t.includes('contact'))return'#C084FC';return'#D1D5DB'}

// Soft tint for section header + entry cards (matches in-app bgStart palette).
function BG(t){t=t.toLowerCase();if(t.includes('vet')||t.includes('vaccination')||t.includes('microchip'))return'#E5F0FF';if(t.includes('medication')||t.includes('allerg')||t.includes('symptom'))return'#DDFCFE';if(t.includes('diet'))return'#FFF2E1';if(t.includes('groom'))return'#FCECF6';if(t.includes('training')||t.includes('quirk'))return'#E8FDED';if(t.includes('potty'))return'#FCECF6';if(t.includes('household'))return'#FFF2E1';if(t.includes('exercise'))return'#F2FDD7';if(t.includes('sleep'))return'#F7EEFF';if(t.includes('document')||t.includes('contact'))return'#F7EEFF';return'#F6F7F8'}

function SE(t){t=t.toLowerCase();if(t.includes('vaccination'))return'\u{1F489}';if(t.includes('contact'))return'\u{1F465}';if(t.includes('vet'))return'\u{1F3E5}';if(t.includes('medication'))return'\u{1F48A}';if(t.includes('allerg'))return'\u26A0\uFE0F';if(t.includes('diet'))return'\u{1F37D}\uFE0F';if(t.includes('groom'))return'\u2702\uFE0F';if(t.includes('symptom'))return'\u{1F321}\uFE0F';if(t.includes('document'))return'\u{1F4C4}';if(t.includes('exercise'))return'\u{1F43E}';if(t.includes('sleep'))return'\u{1F634}';if(t.includes('training'))return'\u{1F393}';if(t.includes('quirk'))return'\u26A1';if(t.includes('household'))return'\u{1F3E0}';if(t.includes('potty'))return'\u{1F6BD}';return'\u{1F4CC}'}

// Inline Lucide icons (SVG) — used next to the 'Tap to view...' chip to mirror the in-app style.
var ICON_FILE_TEXT='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>';
var ICON_IMAGE='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>';
var ICON_PHONE='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px;flex-shrink:0;vertical-align:middle"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.36 2 2 0 0 1 3.59 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.56a16 16 0 0 0 5.55 5.55l.86-.86a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>';
var ICON_MAIL='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px;flex-shrink:0;vertical-align:middle"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>';

function FE(en,st,bc,bg){
  var t=(st||'').toLowerCase();
  var style='';
  if(bc)style+='border-left:3px solid '+bc+';';
  if(bg)style+='background:'+bg+';';
  var h='<div class="entry"'+(style?' style="'+style+'"':'')+'>';
  // Diet + Grooming don't need dates — matches in-app which hides them.
  var showDate=!(t.includes('diet')||t.includes('groom'));
  h+='<div class="entry-header"><span class="entry-title">'+E(en.title)+'</span>';
  if(showDate&&en.entry_date)h+='<span class="entry-date">'+D(en.entry_date)+'</span>';
  h+='</div>';

  if(en.content){try{
    var p=JSON.parse(en.content);
    if(typeof p==='object'&&p!==null){
      if(t.includes('contact')){
        h+='<div class="entry-content">';
        if(p.role)h+='<div style="color:var(--text-sub);font-size:12px;margin-bottom:4px">'+E(p.role)+'</div>';
        // Strip whitespace from tel: URL — iOS treats `tel:+44 7xxx` with spaces as malformed and falls back to Messages.
        if(p.phone)h+='<div><a class="entry-link" href="tel:'+E(String(p.phone).replace(/[^\d+]/g,''))+'">'+ICON_PHONE+' '+E(p.phone)+'</a></div>';
        if(p.phone2)h+='<div><a class="entry-link" href="tel:'+E(String(p.phone2).replace(/[^\d+]/g,''))+'">'+ICON_PHONE+' '+E(p.phone2)+'</a></div>';
        if(p.email)h+='<div><a class="entry-link" href="mailto:'+E(p.email)+'">'+ICON_MAIL+' '+E(p.email)+'</a></div>';
        if(p.content||p.notes)h+='<div style="color:var(--text-sub);margin-top:6px;font-size:12px">'+E(p.content||p.notes)+'</div>';
        h+='</div>';
      }else if(t.includes('allerg')){
        h+='<div class="entry-content">';
        if(p.severity){var cls=p.severity==='Severe'?'severe':p.severity==='Moderate'?'moderate':'mild';h+='<span class="severity-badge severity-'+cls+'">'+E(p.severity)+'</span> '}
        if(p.reaction)h+='<div style="margin-top:4px"><span class="entry-label">Reaction:</span> '+E(p.reaction)+'</div>';
        // Skip notes that are just the literal placeholder-bait word 'Treatment' (users
        // occasionally typed it thinking it was a required label).
        var allergyNotes=p.content||p.notes;
        if(allergyNotes && allergyNotes.trim().toLowerCase()!=='treatment')h+='<div style="color:var(--text-sub);margin-top:4px;font-size:12px">'+E(allergyNotes)+'</div>';
        h+='</div>';
      }else if(Array.isArray(p.meals)){
        h+='<div class="entry-content">';
        p.meals.forEach(function(m){h+='<div class="meal-row"><span class="meal-name">'+E(m.name||'Meal')+'</span><span class="meal-time">'+E(m.time||'Not set')+'</span></div>'});
        h+='</div>';
      }else if(t.includes('groom')){
        h+='<div class="entry-content">';
        if(p.frequency){var fr=(p.frequency==='Custom'&&p.customNum&&p.customUnit)?'Every '+p.customNum+' '+p.customUnit:p.frequency;h+='<div><span class="entry-label">Frequency:</span> '+E(fr)+'</div>'}
        if(p.duration)h+='<div><span class="entry-label">Duration:</span> '+E(p.duration)+' mins</div>';
        if(p.notes||p.content)h+='<div style="color:var(--text-sub);margin-top:4px;font-size:12px">'+E(p.notes||p.content)+'</div>';
        h+='</div>';
      }else if(t.includes('vet')){
        h+='<div class="entry-content">';
        if(p.reason)h+='<div><span class="entry-label">Reason:</span> '+E(p.reason)+'</div>';
        if(p.outcome)h+='<div><span class="entry-label">Outcome:</span> '+E(p.outcome)+'</div>';
        if(p.content||p.notes)h+='<div style="color:var(--text-sub);margin-top:4px;font-size:12px">'+E(p.content||p.notes)+'</div>';
        h+='</div>';
      }else if(t.includes('vaccination')){
        h+='<div class="entry-content">';
        if(p.valid_for)h+='<div><span class="entry-label">Valid for:</span> '+E(p.valid_for)+'</div>';
        if(p.content||p.notes)h+='<div style="color:var(--text-sub);margin-top:4px;font-size:12px">'+E(p.content||p.notes)+'</div>';
        h+='</div>';
      }else if(t.includes('medication')){
        h+='<div class="entry-content">';
        if(p.dosage)h+='<div><span class="entry-label">Dosage:</span> '+E(p.dosage)+'</div>';
        if(p.status){var medCls=p.status==='Active'?'med-status-active':'med-status-inactive';h+='<div><span class="med-status '+medCls+'">'+E(p.status)+'</span></div>';}
        if(p.content||p.notes)h+='<div style="color:var(--text-sub);margin-top:4px;font-size:12px">'+E(p.content||p.notes)+'</div>';
        h+='</div>';
      }else if(t.includes('symptom')){
        h+='<div class="entry-content">';
        var sNotes=p.notes||p.content;
        if(sNotes&&sNotes.trim().toLowerCase()!=='symptom')h+='<div style="color:var(--text-sub);margin-top:4px;font-size:12px">'+E(sNotes)+'</div>';
        h+='</div>';
      }else if(t.includes('document')){
        h+='<div class="entry-content">';
        if(p.content||p.notes)h+='<div style="color:var(--text-sub);margin-top:4px;font-size:12px">'+E(p.content||p.notes)+'</div>';
        h+='</div>';
      }else{
        var pts=[],sk=['is_key','isKey','date','time','content','notes','doc_category','symptom'];
        for(var k in p){if(!p[k]||!String(p[k]).trim()||sk.indexOf(k)>=0)continue;var lb=k.replace(/_/g,' ').replace(/([A-Z])/g,' $1').replace(/^./,function(s){return s.toUpperCase()}).trim();pts.push('<span class="entry-label">'+E(lb)+':</span> '+E(String(p[k])))}
        if(pts.length)h+='<div class="entry-content">'+pts.join('<br/>')+'</div>';
      }
    }else{h+='<div class="entry-content">'+E(String(p))+'</div>'}
  }catch(e){h+='<div class="entry-content">'+E(en.content)+'</div>'}}

  // Photo thumbnail (images) or compact doc link (PDFs / other files).
  // Clicks are intercepted and opened in an inline viewer so recipients
  // never see the raw storage URL in the address bar.
  if(en.file_url){
    var isImg=en.file_type&&(en.file_type.includes('image')||en.file_type.includes('heic')||en.file_type.includes('jpg')||en.file_type.includes('png'));
    var isPdf=en.file_type&&en.file_type.includes('pdf');
    var safeUrl=E(en.file_url);
    var safeName=E(en.title||'file');
    // Mirror in-app chip: small inline icon (Image for photos, FileText for docs/PDFs) + purple text.
    var iconSvg, label, vtype;
    if(isImg){      iconSvg=ICON_IMAGE;     label='Tap to view image';    vtype='image';
    }else if(isPdf){iconSvg=ICON_FILE_TEXT; label='Tap to view document'; vtype='pdf';
    }else{          iconSvg=ICON_FILE_TEXT; label='Tap to view document'; vtype='file'; }
    // In the Documents section, treat everything as a document — even if the user
    // uploaded a photo, the card should read 'Tap to view document' and use the
    // FileText icon. vtype stays 'image' so the inline viewer still renders it
    // correctly; only the chip label/icon is overridden.
    if(t.includes('document')){ iconSvg=ICON_FILE_TEXT; label='Tap to view document'; }
    h+='<a class="tap-view" href="'+safeUrl+'" data-view-type="'+vtype+'" data-view-url="'+safeUrl+'" data-view-name="'+safeName+'" target="_blank" rel="noopener">'+iconSvg+'<span>'+label+'</span></a>';
  }

  h+='</div>';
  return h;
}

function render(data){
  var d=data.dog,info=[d.breed,d.age].filter(Boolean).join(' \u2022 ');
  var h='<div class="header">';
  // Avatar — photo if set, else pip-jumping mascot inside the ring
  if(d.photo_url){
    h+='<div class="avatar-ring"><img class="avatar" src="'+E(d.photo_url)+'" alt="'+E(d.name)+'"></div>';
  }else{
    h+='<div class="pip-mascot"><img src="pip-jumping.png" alt="Pip"></div>';
  }
  h+='<div class="dog-name">'+E(d.name)+'</div>';
  h+='<div class="dog-subtitle"><span class="live-dot"></span>Shared live via <img class="pip-inline-logo" src="pip-logo-white.png" alt="Pip"></div>';
  h+='</div><div class="container">';
  // Stats card — inside container so spacing is consistent with section cards
  var stats=[];
  if(d.breed)stats.push('<div class="stat"><span class="stat-value">'+E(d.breed)+'</span><span class="stat-label">Breed</span></div>');
  if(d.age)stats.push('<div class="stat"><span class="stat-value">'+E(d.age)+'</span><span class="stat-label">Age</span></div>');
  if(d.weight)stats.push('<div class="stat"><span class="stat-value">'+E(d.weight)+'</span><span class="stat-label">Weight</span></div>');
  if(stats.length)h+='<div class="stats-card">'+stats.join('')+'</div>';

  if(!data.sections||!data.sections.length){
    h+='<div class="section"><div class="section-body"><div class="empty">No care plan entries yet.</div></div></div>';
  }else{
    data.sections.forEach(function(s){
      var bc=BC(s.title),bg=BG(s.title);
      h+='<div class="section">';
      h+='<div class="section-header" style="background:'+bg+'"><span class="section-emoji">'+(s.emoji||SE(s.title))+'</span>';
      h+='<span class="section-title">'+E(s.title)+'</span>';
      if((!s.type||s.type==='data')&&s.entries&&s.entries.length)h+='<span class="entry-count">'+s.entries.length+'</span>';
      h+='</div><div class="section-body">';
      if(s.type==='text'){
        // Free-text section — preserve line breaks from user input.
        h+='<div class="free-text">'+E(s.content).replace(/\n/g,'<br/>')+'</div>';
      }else{
        // Data-driven section (default for legacy payloads without `type`).
        var es=s.entries||[];
        // Filter contacts to key-only; filter documents to key-only
        var tl=s.title.toLowerCase();
        if(tl.includes('contact')){
          es=es.filter(function(e){try{var p=JSON.parse(e.content||'{}');return p.isKey===true||p.isKey==='true'||!!p.key_contact;}catch(x){return false;}});
        }
        if(tl.includes('document')){
          var keyed=es.filter(function(e){try{var p=JSON.parse(e.content||'{}');return p.isKey===true||p.isKey==='true'||!!p.key_document;}catch(x){return false;}});
          if(keyed.length)es=keyed;
        }
        if(!es.length)h+='<div class="empty">No entries yet</div>';
        // Pass only the border colour (bc) to FE — entries use a neutral grey bg;
        // only the section header carries the tint (bg).
        else es.forEach(function(e){h+=FE(e,s.title,bc,null)});
      }
      h+='</div></div>';
    });
  }

  h+='</div>';
  h+='<div style="text-align:center;padding:24px 24px 40px;color:#C4C9D4;font-size:11px;font-family:Inter,sans-serif">Shared via Pip &middot; Refreshes live</div>';

  document.getElementById('app').innerHTML=h;
  document.title=d.name+"'s Care Profile \u2014 Pip";
  if(TK)try{localStorage.setItem('pip_name_'+TK,d.name);}catch(e){}
  // Personalise OG tags (affects bookmarks and re-shares after first load)
  var ogTitle=document.querySelector('meta[property="og:title"]');
  if(ogTitle)ogTitle.content=d.name+"'s Care Profile";
  var ogDesc=document.querySelector('meta[property="og:description"]');
  if(ogDesc)ogDesc.content=d.name+"'s care profile \u2014 shared via Pip. View "+d.name+"'s complete care profile including vet info, medications, key documents, diet & more.";
  var twTitle=document.querySelector('meta[name="twitter:title"]');
  if(twTitle)twTitle.content=d.name+"'s Care Profile";
  var twDesc=document.querySelector('meta[name="twitter:description"]');
  if(twDesc)twDesc.content=d.name+"'s care profile \u2014 shared via Pip.";
}

function err(icon,title,msg){
  document.getElementById('app').innerHTML='<div class="card-center"><div class="card"><div class="icon">'+icon+'</div><h1>'+E(title)+'</h1><p>'+E(msg)+'</p><div style="margin-top:24px"><div class="footer-badge">\u{1F43E} Pip</div></div></div></div>';
}

function pinUI(em){
  var h='<div class="card-center"><div class="card">';
  h+='<div class="pip-logo" style="justify-content:center;margin-bottom:24px"><div class="pip-logo-icon">\u{1F43E}</div><span style="color:var(--purple)">pip</span></div>';
  h+='<h1>\u{1F510} PIN Required</h1>';
  h+='<p style="margin-bottom:4px">This care profile is protected.</p><p>Enter the 4-digit PIN to view it.</p>';
  if(em)h+='<p class="error-msg" style="margin-top:12px">'+E(em)+'</p>';
  h+='<div class="pin-input">';
  for(var i=0;i<4;i++)h+='<input type="tel" maxlength="1" pattern="[0-9]" inputmode="numeric"'+(i===0?' autofocus':'')+'>';
  h+='</div><button id="ps">View Care Profile</button></div></div>';
  document.getElementById('app').innerHTML=h;

  var ins=document.querySelectorAll('.pin-input input');
  ins.forEach(function(inp,i){
    inp.addEventListener('input',function(){inp.value=inp.value.replace(/\D/g,'');if(inp.value&&i<3)ins[i+1].focus()});
    inp.addEventListener('keydown',function(e){if(e.key==='Backspace'&&!inp.value&&i>0)ins[i-1].focus()});
  });
  document.getElementById('ps').addEventListener('click',function(){
    var pin=Array.from(ins).map(function(x){return x.value}).join('');
    if(pin.length===4)load(pin);
  });
}

// ── Inline viewer (keeps recipients on share.pip.dog; hides raw storage URL) ──
// PDFs render through PDF.js into fit-width canvases — iOS Safari's native PDF
// viewer ignores URL fragments and paints over HTML, so using it directly means
// zoomed-in content and hidden controls. Rendering ourselves fixes both.
function openViewer(type,url,name){
  var v=document.getElementById('viewer'),inner=document.getElementById('viewerInner');
  if(type==='image'){
    inner.innerHTML='<img src="'+E(url)+'" alt="'+E(name||'Photo')+'">';
  }else if(type==='pdf'){
    inner.innerHTML='<div class="pdf-pages" id="pdfPages"><div class="pdf-loading">Loading PDF\u2026</div></div>';
    renderPdfPages(url);
  }else{
    // Unknown file type — fall back to opening the file directly (rare path)
    window.open(url,'_blank','noopener');return;
  }
  v.classList.add('open');
  document.body.style.overflow='hidden';
}
function closeViewer(){
  var v=document.getElementById('viewer'),inner=document.getElementById('viewerInner');
  v.classList.remove('open');
  inner.innerHTML='';
  document.body.style.overflow='';
}
// Wire the static close button once — avoids re-binding on every openViewer.
document.getElementById('viewerClose').addEventListener('click',closeViewer);

// Render every PDF page into a fit-width canvas inside #pdfPages.
// Canvases are rendered at devicePixelRatio for crispness on retina displays,
// then scaled down via CSS (width:100%) so every page fills the viewport width.
async function renderPdfPages(url){
  if(!window.pdfjsLib){document.getElementById('pdfPages').innerHTML='<div class="pdf-loading">PDF viewer failed to load. Use the Download button.</div>';return}
  try{
    var container=document.getElementById('pdfPages');
    var pdf=await pdfjsLib.getDocument({url:url,withCredentials:false}).promise;
    container.innerHTML='';
    var containerWidth=Math.min(container.clientWidth-24,900);
    var dpr=Math.min(window.devicePixelRatio||1,2);
    for(var pageNum=1;pageNum<=pdf.numPages;pageNum++){
      var page=await pdf.getPage(pageNum);
      var viewport1=page.getViewport({scale:1});
      var scale=(containerWidth/viewport1.width)*dpr;
      var viewport=page.getViewport({scale:scale});
      var canvas=document.createElement('canvas');
      canvas.width=viewport.width;
      canvas.height=viewport.height;
      container.appendChild(canvas);
      await page.render({canvasContext:canvas.getContext('2d'),viewport:viewport}).promise;
    }
  }catch(e){
    var c=document.getElementById('pdfPages');
    if(c)c.innerHTML='<div class="pdf-loading">Couldn\u2019t render the PDF inline. Use the Download button to view it.</div>';
  }
}
// Delegated click handler — intercept any link with data-view-type
document.addEventListener('click',function(ev){
  var a=ev.target.closest&&ev.target.closest('[data-view-type]');
  if(!a)return;
  ev.preventDefault();
  openViewer(a.getAttribute('data-view-type'),a.getAttribute('data-view-url'),a.getAttribute('data-view-name'));
});
// Close on overlay click or Esc key
document.addEventListener('click',function(ev){
  if(ev.target&&ev.target.id==='viewer')closeViewer();
});
document.addEventListener('keydown',function(ev){if(ev.key==='Escape')closeViewer()});

async function load(pin){
  if(!TK){err('\u{1F615}','Invalid Link','This share link is missing a token.');return}
  var u=API+'?token='+encodeURIComponent(TK);
  if(pin)u+='&pin='+encodeURIComponent(pin);
  try{
    var r=await fetch(u);var d=await r.json();
    if(d.error==='pin_required'){pinUI();return}
    if(d.error==='pin_incorrect'){pinUI('Incorrect PIN. Please try again.');return}
    if(d.error==='not_found'){err('\u{1F615}','Not Found',d.message);return}
    if(d.error==='expired'){err('\u23F0','Link Expired',d.message);return}
    if(d.error==='revoked'){err('\u{1F6AB}','Link Revoked',d.message);return}
    if(d.error){err('\u{1F615}','Error',d.message||'Something went wrong.');return}
    render(d);
  }catch(e){err('\u{1F615}','Connection Error','Could not load the care profile. Please check your connection and try again.')}
}
load();
